<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Links - BlueSharkSec</title>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #18181b;
      padding: 24px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      text-align: center;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 12px;
    }

    h1 {
      margin: 8px 0 4px;
    }

    .bio {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .icon-btn {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: #fff;
      color: #000;
      font-size: 20px;
      cursor: pointer;
      transition: 0.2s;
    }

    .icon-btn:hover {
      transform: scale(1.15);
      background: #e5e5e5;
    }

    .solana-btn {
      background: #fff;
    }

    .solana-btn img {
      width: 24px;
      height: 24px;
    }

    .solana-btn:hover {
      transform: scale(1.15);
      background: #e5e5e5;
    }

    .note {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="avatar" src="https://r2.guns.lol/83975cbe-1b0e-4c9d-b891-aa7c8bf1b495.webp" alt="avatar" />

    <h1>@yourname</h1>
    <div class="bio">Learning Cyber Sec, Pen Testing, Python and Web Dev.</div>

    <div class="links">
      <div class="icon-btn" onclick="openLink('https://youtube.com/@P3ngwen')">
        <i class="fab fa-youtube"></i>
      </div>
      <div class="icon-btn" onclick="openLink('https://tiktok.com/@noah70074')">
        <i class="fab fa-tiktok"></i>
      </div>
      <div class="icon-btn" onclick="openLink('https://twitch.tv/blahajfn')">
        <i class="fab fa-twitch"></i>
      </div>
      <div class="icon-btn" onclick="openLink('https://discord.gg/aWnuBjVbMs')">
        <i class="fab fa-discord"></i>
      </div>

      <!-- Real Solana Logo Button -->
      <div class="icon-btn solana-btn" onclick="copyWallet()">
        <img src="https://cryptologos.cc/logos/solana-sol-logo.png" alt="Solana" />
      </div>
    </div>

    <div class="note">Click the Solana icon to copy wallet</div>
  </div>

  <script>
    const solanaAddress = "Abwv131b4GcQA2GVt5pYad7uKJb5r3KDfAVeEHzHvhyZ";

    function openLink(url) {
      window.open(url, '_blank');
    }

    function copyWallet() {
      navigator.clipboard.writeText(solanaAddress);
      alert('Solana address copied!');
    }
  </script>
</body>
</html>
